name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  ZIG_VERSION: 0.15.2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: |
          mkdir -p "$RUNNER_TEMP/zig"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/zig"
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"
      - run: zig version
      - run: zig build test
      - run: tools/check_downstream_import.sh
